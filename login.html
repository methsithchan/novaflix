<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NovaFlix</title>
    <meta content="#E50914" name="theme-color" />
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.10.3/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="lib/supabaseClient.js"></script>
    <script src="lib/auth.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'netflix-red': '#E50914',
                        'netflix-black': '#141414',
                        'netflix-dark-gray': '#222222',
                        'netflix-medium-gray': '#333333',
                        'netflix-light-gray': '#A0A0A0',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .auth-bg {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bcae-07a3f8dc141a/f6d7434e-d6de-4185-a6d4-c77a2d08737b/US-en-20220502-popsignuptwoweeks-perspective_alpha_website_medium.jpg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body class="bg-[#0f0f0f] text-white font-sans min-h-screen flex flex-col relative overflow-hidden">

    <!-- Background Effects -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-purple-900/20 blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-red-900/20 blur-[120px]"></div>
    </div>

    <header class="px-6 py-6 flex justify-between items-center z-10">
        <a href="index.html" class="flex items-center gap-2 group">
            <img src="assets/img/nflix.png" alt="NovaFlix" class="h-8 md:h-10 transition-transform group-hover:scale-105">
        </a>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 z-10 relative">
        <div class="w-full max-w-md" x-data="loginForm()">

            <!-- Glassmorphism Card -->
            <div
                class="backdrop-blur-xl bg-white/5 border border-white/10 rounded-2xl p-8 md:p-10 shadow-2xl relative overflow-hidden">

                <!-- Decorative top line -->
                <div
                    class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-netflix-red to-transparent opacity-50">
                </div>

                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-white mb-2 tracking-tight">Welcome Back</h1>
                    <p class="text-gray-400 text-sm">Enter your credentials to access your account</p>
                </div>

                <div x-show="errorMessage"
                    class="bg-red-500/10 border border-red-500/20 text-red-200 p-4 rounded-lg text-sm mb-6 flex items-start gap-3"
                    x-transition>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 mt-0.5" viewBox="0 0 20 20"
                        fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                            clip-rule="evenodd" />
                    </svg>
                    <span x-text="errorMessage"></span>
                </div>

                <!-- Google Sign-In -->
                <button @click="signInWithGoogle" type="button"
                    class="w-full bg-white text-gray-900 font-semibold py-3.5 rounded-xl shadow-lg hover:bg-gray-100 transform hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center gap-3 mb-4">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Sign in with Google
                </button>

                <!-- Divider -->
                <div class="relative flex py-2 items-center mb-4">
                    <div class="flex-grow border-t border-gray-700"></div>
                    <span class="flex-shrink-0 mx-4 text-gray-500 text-xs uppercase">Or with email</span>
                    <div class="flex-grow border-t border-gray-700"></div>
                </div>

                <form @submit.prevent="submitLogin" class="space-y-5">
                    <div class="space-y-1">
                        <label class="text-xs font-medium text-gray-400 ml-1 uppercase tracking-wider">Email</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg xmlns="http://www.w3.org/2000/svg"
                                    class="h-5 w-5 text-gray-500 group-focus-within:text-white transition-colors"
                                    fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                </svg>
                            </div>
                            <input type="email" x-model="email" placeholder="name@example.com" required
                                class="w-full bg-black/40 border border-white/10 rounded-xl px-11 py-3.5 text-white placeholder-gray-500 focus:outline-none focus:border-netflix-red/50 focus:ring-1 focus:ring-netflix-red/50 transition-all duration-300">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-xs font-medium text-gray-400 ml-1 uppercase tracking-wider">Password</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg xmlns="http://www.w3.org/2000/svg"
                                    class="h-5 w-5 text-gray-500 group-focus-within:text-white transition-colors"
                                    fill="none" viewBox="0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            </div>
                            <input type="password" x-model="password" placeholder="••••••••" required
                                class="w-full bg-black/40 border border-white/10 rounded-xl px-11 py-3.5 text-white placeholder-gray-500 focus:outline-none focus:border-netflix-red/50 focus:ring-1 focus:ring-netflix-red/50 transition-all duration-300">
                        </div>
                    </div>

                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center cursor-pointer group">
                            <input type="checkbox"
                                class="w-4 h-4 rounded border-gray-600 bg-black/40 text-netflix-red focus:ring-netflix-red/50 transition">
                            <span class="ml-2 text-gray-400 group-hover:text-gray-300 transition-colors">Remember
                                me</span>
                        </label>
                        <a href="#" class="text-gray-400 hover:text-white transition-colors text-xs">Forgot
                            password?</a>
                    </div>

                    <button type="submit" :disabled="loading"
                        class="w-full bg-gradient-to-r from-netflix-red to-red-700 hover:from-red-600 hover:to-red-800 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-red-900/20 hover:shadow-red-900/40 transform hover:-translate-y-0.5 transition-all duration-300 disabled:opacity-70 disabled:cursor-not-allowed disabled:transform-none">
                        <span x-show="!loading" class="flex items-center justify-center gap-2">
                            Sign In
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M14 5l7 7m0 0l-7 7m7-7H3" />
                            </svg>
                        </span>
                        <span x-show="loading" class="flex items-center justify-center gap-2">
                            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                                viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg>
                            Authenticating...
                        </span>
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-white/5 text-center">
                    <p class="text-gray-400 text-sm">
                        Don't have an account?
                        <a href="signup.html"
                            class="text-white font-medium hover:text-netflix-red transition-colors ml-1">Sign up now</a>
                    </p>
                </div>
            </div>

            <div class="mt-8 text-center">
                <p class="text-xs text-gray-600 max-w-xs mx-auto">
                    Protected by reCAPTCHA and subject to the Google Privacy Policy and Terms of Service.
                </p>
            </div>
        </div>
    </main>

    <script>
        function loginForm() {
            return {
                email: '',
                password: '',
                loading: false,
                errorMessage: '',

                async submitLogin() {
                    this.loading = true;
                    this.errorMessage = '';

                    const { data, error } = await auth.signIn(this.email, this.password);

                    if (error) {
                        this.errorMessage = error.message;
                        this.loading = false;
                    } else {
                        // Redirect to home on success
                        window.location.href = 'index.html';
                    }
                },

                async signInWithGoogle() {
                    this.errorMessage = '';
                    const { data, error } = await auth.signInWithGoogle();
                    if (error) {
                        this.errorMessage = error.message;
                    }
                    // Note: Redirect is handled automatically by Supabase OAuth flow
                }
            }
        }
    </script>
</body>

</html>
